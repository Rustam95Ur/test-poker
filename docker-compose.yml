services:
  fastapi:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: poker-fastapi
    restart: unless-stopped
    environment:
      - CLICKHOUSE_HOST=clickhouse
      - CLICKHOUSE_PORT=8123
      - CLICKHOUSE_USER=app
      - CLICKHOUSE_PASSWORD=app_pass_123
      - CLICKHOUSE_DB=poker
      - USE_CLICKHOUSE_STATS=1
      - CLICKHOUSE_AGG_TABLE=events_agg
    depends_on:
      - clickhouse
    volumes:
      - ./stat_catalog.json:/app/stat_catalog.json:ro
      - ./population_hands.txt:/app/population_hands.txt:ro
      - ./gto_hands.txt:/app/gto_hands.txt:ro
    ports:
      - "127.0.0.1:8000:8000"
    networks:
      - app-net

  react:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: poker-react
    restart: unless-stopped
    depends_on:
      - fastapi
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "127.0.0.1:3000:3000"
    networks:
      - app-net

  nginx:
    image: nginx:1.27-alpine
    container_name: poker-nginx
    restart: unless-stopped
    depends_on:
      - react
      - fastapi
    ports:
      - "127.0.0.1:80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - app-net

  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    container_name: poker-clickhouse
    restart: unless-stopped
    environment:
      - CLICKHOUSE_USER=app
      - CLICKHOUSE_PASSWORD=app_pass_123
      - CLICKHOUSE_DB=poker
    ports:
      - "127.0.0.1:8123:8123"
      - "127.0.0.1:9000:9000"
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - ./import_data:/import_data:ro
    networks:
      - app-net

volumes:
  clickhouse-data:

networks:
  app-net:
    driver: bridge
